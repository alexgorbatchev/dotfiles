# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
palette:
  black: "#262B44"
  blue: "#82aaff"
  dark-blue: "#3b4261"
  dark-gray: "#404040"
  gray: "#e0e0e0"
  green: "#59C9A5"
  orange: "#F07623"
  red: "#D81E5B"
  white: "#E0DEF4"
  yellow: "#F3AE35"

console_title_template: "{{ .Shell }} in {{ .Folder }}"

blocks:
  - type: prompt
    newline: true
    alignment: left
    segments:
      - properties:
          cache_duration: none
        template: " \uf0e7 "
        foreground: p:white
        powerline_symbol: 
        background: p:red
        type: root
        style: powerline

      - properties:
          cache_duration: none
          style: full
        trailing_diamond: 
        template: "{{ if .Segments.Git.Dir }}{{ .Segments.Git.Dir | base }}{{ .Path | trimPrefix .Segments.Git.Dir }}{{ end }} "
        foreground: p:white
        background: p:dark-blue
        type: path
        style: diamond

      - properties:
          cache_duration: none
          style: agnoster
        trailing_diamond: 
        template: "{{ if not .Segments.Git.Dir }}{{ .Path }}{{ end }} "
        foreground: p:white
        background: p:dark-blue
        type: path
        style: diamond

      - properties:
          always_enabled: true
          cache_duration: none
        trailing_diamond: 
        template: " {{ if gt .Code 0 }}\uf00d{{ else }}\uf00c{{ end }} "
        foreground: p:black
        background: p:green
        type: status
        style: diamond
        foreground_templates:
          - "{{ if gt .Code 0 }}p:white{{ end }}"
        background_templates:
          - "{{ if gt .Code 0 }}p:red{{ end }}"
