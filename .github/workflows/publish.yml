name: Publish release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Derive release version from tag
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$release_version" || "$release_version" == "$GITHUB_REF_NAME" ]]; then
            echo "Expected a tag like v1.2.3, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Validate package version matches the release tag
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "package.json version ($package_version) must match release tag version ($RELEASE_VERSION)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        env:
          CI: "false"
        run: |
          bun run compile

      - name: Read package metadata
        id: package
        run: |
          echo "name=@alexgorbatchev/dotfiles" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check npm for existing package version
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "alreadyPublished=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm; skipping publish."
          else
            echo "alreadyPublished=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update draft GitHub Release with binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ ! -f .dist/dotfiles ]]; then
            echo "Expected compiled binary at .dist/dotfiles" >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" .dist/dotfiles --clobber
          else
            gh release create "$GITHUB_REF_NAME" .dist/dotfiles \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "Version $RELEASE_VERSION"
          fi

      - name: Publish package
        if: steps.npm.outputs.alreadyPublished != 'true'
        run: |
          cd .dist
          npm publish --provenance --access public

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq '.isDraft')" == "true" ]]; then
            gh release edit "$GITHUB_REF_NAME" --draft=false --latest
          else
            echo "GitHub Release is already published for $GITHUB_REF_NAME; leaving it as-is."
          fi
